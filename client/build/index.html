<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fitness MVP</title>
  <!-- Load React and ReactDOM from CDNs -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 { color: #333; }
    h2 { margin-top: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- React code using Babel transpilation -->
  <script type="text/babel">
    function App() {
      const [workouts, setWorkouts] = React.useState([]);
      const [barbers, setBarbers] = React.useState([]);

      React.useEffect(() => {
        fetch('/api/workouts')
          .then(res => res.json())
          .then(setWorkouts);

        fetch('/api/barbers')
          .then(res => res.json())
          .then(setBarbers);
      }, []);

      return (
        <div>
          <h1>Fitness MVP</h1>
          <h2>Workouts</h2>
          <ul>
            {workouts.map(w => (
              <li key={w.id}>{w.name} – {w.description}</li>
            ))}
          </ul>
          <h2>Barbers</h2>
          <ul>
            {barbers.map(b => (
              <li key={b.id}>{b.name} – {b.price}</li>
            ))}
          </ul>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
